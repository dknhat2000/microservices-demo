# prometheus-blackbox-exporter values (PoC). Plain Deployment — Autopilot-friendly.
# Used to probe the frontend Service for black-box availability + latency SLIs
# (no service mesh / no app instrumentation needed).
resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    memory: 64Mi

config:
  modules:
    http_2xx:
      prober: http
      timeout: 5s
      http:
        valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
        valid_status_codes: [200]
        method: GET
        follow_redirects: true
        preferred_ip_protocol: ip4
