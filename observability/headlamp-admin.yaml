# Admin ServiceAccount for logging into Headlamp (the K8s review dashboard).
# cluster-admin is broad, but access is local-only (port-forward) on a throwaway
# PoC cluster. For anything real, scope this down to a read-only ClusterRole.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: headlamp-admin
  namespace: headlamp
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: headlamp-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: headlamp-admin
    namespace: headlamp
