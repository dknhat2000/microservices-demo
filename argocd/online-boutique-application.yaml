# ArgoCD Application: GitOps pull-based deploy of Online Boutique from the fork's
# helm-chart/, so a merge to main (including the PoC CI's bot commit bumping
# frontend's image tag) is the only trigger needed — nothing pushes to the cluster directly.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: online-boutique
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/dknhat2000/microservices-demo.git
    targetRevision: main
    path: helm-chart
    helm:
      releaseName: online-boutique
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
